<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Cek Nilai Mahasiswa</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .container { max-width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #hasil { margin-top: 20px; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cek Huruf Mutu</h2>
        
        <div class="input-group">
            <label for="nim">NIM:</label>
            <input type="text" id="nim" placeholder="Masukkan NIM">
        </div>

        <div class="input-group">
            <label for="nilai">Nilai Mata Kuliah:</label>
            <input type="number" id="nilai" placeholder="Contoh: 85">
        </div>

        <button id="btnCek">Cek Nilai</button>

        <div id="hasil"></div>
    </div>

    <script>
        // b. Mengangani event klik tombol
        document.getElementById('btnCek').addEventListener('click', function() {
            const nim = document.getElementById('nim').value;
            const nilaiInput = document.getElementById('nilai').value;
            const hasilDiv = document.getElementById('hasil');
            
            // Konversi input ke angka
            const nilai = parseFloat(nilaiInput);

            // Validasi jika input kosong
            if (nim === "" || nilaiInput === "") {
                hasilDiv.innerHTML = '<span class="error">Harap isi NIM dan Nilai!</span>';
                return;
            }

            // Validasi rentang nilai 0 - 100
            if (nilai < 0 || nilai > 100) {
                hasilDiv.innerHTML = '<span class="error">Nilai tidak valid!</span>';
            } else {
                let hurufMutu = "";

                // c. Kondisi if-else untuk menentukan huruf mutu
                if (nilai >= 80) {
                    hurufMutu = "A";
                } else if (nilai >= 70) {
                    hurufMutu = "B";
                } else if (nilai >= 60) {
                    hurufMutu = "C";
                } else if (nilai >= 50) {
                    hurufMutu = "D";
                } else {
                    hurufMutu = "E";
                }

                // Tampilkan hasil akhir
                hasilDiv.innerHTML = `Mahasiswa dengan NIM ${nim} mendapatkan Huruf Mutu: ${hurufMutu}`;
                hasilDiv.classList.remove('error');
            }
        });
    </script>

</body>
</html>
